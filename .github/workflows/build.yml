name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Windows Desktop (.msi) ──
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install WiX Toolset
        run: dotnet tool install --global wix --version 5.0.2

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri (Windows)
        run: pnpm tauri build --bundles msi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: MDClipView-Windows
          path: src-tauri/target/release/bundle/msi/*.msi

  # ── Android APK ──
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-linux-android,
            armv7-linux-androideabi,
            i686-linux-android,
            x86_64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;27.0.12077973 cmake;3.22.1'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Linux deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libwebkit2gtk-4.1-dev libxdo-dev libssl-dev

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri (Android)
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973
          pnpm tauri android init
          pnpm tauri android build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: MDClipView-Android
          path: src-tauri/gen/android/app/build/outputs/apk/release/*.apk

  # ── GitHub Release (on tag push) ──
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: MDClipView-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            *.msi
            *.apk
          generate_release_notes: true
