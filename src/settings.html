<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>设置 — MDClipView</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .settings-page { max-width: 480px; margin: 40px auto; padding: 0 20px; }
    .settings-page h2 { font-size: 1.4em; margin-bottom: 24px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #21262d; }
    .setting-row label { font-size: 14px; }
    .setting-row .hint { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .back-btn { background: none; border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; margin-bottom: 24px; }
    .back-btn:hover { background: #21262d; }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="title">⚙️ 设置</span>
    <button id="btnBack" class="back-btn">← 返回</button>
  </div>

  <div class="settings-page">
    <div class="setting-row">
      <div>
        <label>全局热键</label>
        <div class="hint">唤起/隐藏预览窗口</div>
      </div>
      <span style="color: var(--text-dim); font-family: monospace; font-size: 13px;">Ctrl+Shift+M</span>
    </div>

    <div class="setting-row">
      <div>
        <label>自动读取剪贴板</label>
        <div class="hint">打开窗口时自动粘贴</div>
      </div>
      <input type="checkbox" id="toggleAutoClipboard" checked />
    </div>

    <div class="setting-row">
      <div>
        <label>主题</label>
        <div class="hint">深色 / 浅色</div>
      </div>
      <select id="selectTheme" style="background:#21262d;color:var(--text);border:1px solid var(--border);padding:4px 8px;border-radius:4px;font-size:13px;">
        <option value="dark" selected>深色</option>
        <option value="light" disabled>浅色 (即将推出)</option>
      </select>
    </div>

    <div class="setting-row">
      <div>
        <label>版本</label>
        <div class="hint">MDClipView v0.1.0</div>
      </div>
      <span style="color: var(--text-dim); font-size: 13px;">MVP</span>
    </div>
  </div>

  <script>
    document.getElementById('btnBack').addEventListener('click', () => {
      window.location.href = '/index.html';
    });
    document.getElementById('toggleAutoClipboard').addEventListener('change', async (e) => {
      const checked = e.target.checked;
      localStorage.setItem('mdclipview-auto-clipboard', checked);
      if (window.__TAURI__) {
        const { invoke } = window.__TAURI__.core;
        const settings = await invoke('get_settings');
        settings.auto_read_clipboard = checked;
        await invoke('save_settings', { settings });
      }
    });
    // Load saved
    const saved = localStorage.getItem('mdclipview-auto-clipboard');
    if (saved === 'false') document.getElementById('toggleAutoClipboard').checked = false;
  </script>
</body>
</html>
